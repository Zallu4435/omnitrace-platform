# ============================================================
# Logstash Pipeline — main.conf (FIXED)
# ============================================================

# ── INPUT ────────────────────────────────────────────────────
input {
  beats {
    port => 5044
  }
}

# ── FILTER ───────────────────────────────────────────────────
filter {

  # STEP 1: Parse the [message] field as JSON.
  json {
    source => "message"
    target => "pino"
  }

  # STEP 2: Promote key fields from [pino] to the top level.
  # Cleaned up indentation to avoid "LogStash::ConfigurationError"
  mutate {
    add_field => {
      "log_level" => "%{[pino][level]}"
      "log_msg"   => "%{[pino][msg]}"
      "service"   => "%{[pino][context]}"
      "trace_id"  => "%{[pino][traceId]}"
      "pid"       => "%{[pino][pid]}"
    }
  }

  # STEP 3: Parse the Pino timestamp.
  if [pino][time] {
    date {
      match => ["[pino][time]", "UNIX_MS"]
      target => "@timestamp"
      timezone => "UTC"
    }
  }

  # STEP 4: Convert numeric Pino level to a human-readable string.
  if [pino][level] {
    if [pino][level] == 10 {
      mutate { add_field => { "level_name" => "TRACE" } }
    } else if [pino][level] == 20 {
      mutate { add_field => { "level_name" => "DEBUG" } }
    } else if [pino][level] == 30 {
      mutate { add_field => { "level_name" => "INFO" } }
    } else if [pino][level] == 40 {
      mutate { add_field => { "level_name" => "WARN" } }
    } else if [pino][level] == 50 {
      mutate { add_field => { "level_name" => "ERROR" } }
    } else if [pino][level] == 60 {
      mutate { add_field => { "level_name" => "FATAL" } }
    } else {
      mutate { add_field => { "level_name" => "UNKNOWN" } }
    }
  }

  # STEP 5: Add environment metadata.
  mutate {
    add_field => { 
      "environment" => "development"
      "stack"       => "nestjs-observability-platform"
    }
  }

  # STEP 6: Drop noisy health-check logs.
  if [pino][msg] =~ /health/ or [pino][req][url] == "/metrics" {
    drop { }
  }

  # STEP 7: Clean up redundant fields.
  mutate {
    remove_field => [
      "message", 
      "[agent]", 
      "[ecs]", 
      "[input]", 
      "[host]"
    ]
  }
}

# ── OUTPUT ───────────────────────────────────────────────────
output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "microservices-logs-%{+YYYY.MM.dd}"
  }

  # Keep this ON until you see logs in your terminal
  stdout {
    codec => rubydebug
  }
}