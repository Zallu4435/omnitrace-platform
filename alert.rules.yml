groups:
  - name: demo-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "Prometheus could not scrape {{ $labels.instance }} for more than 1 minute. The service might be crashed or unreachable."
          
      - alert: HighErrorRate
        # Example rule (assumes a metric like http_server_requests_seconds_count exists and has a status label)
        # We will use a generic one to demonstrate, or you can craft specific ones based on your metrics logger.
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[1m]) > 0.05
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.instance }}"
          description: "Server error rate is above 5% for 1 minute."
