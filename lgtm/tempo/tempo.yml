server:
  http_listen_port: 3200
  grpc_listen_port: 9095

# Where Tempo receives trace data
distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:

# How Tempo stores trace data
storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal
