global:
  scrape_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: 'nestjs-microservices'
    static_configs:
      # This points to your Order Gateway running on port 3000
      # (Use host.docker.internal so the container can reach your local machine)
      - targets: ['host.docker.internal:3000']